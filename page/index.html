<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CryptoDash</title>

    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/dashboard.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

    <div id="header"></div>

    <main class="dashboard">

        <h1>🚀 Crypto Dashboard</h1>

        <p>
            Search Any Cryptocurrency
        </p>

        <!-- Search Box -->

        <input type="text" id="search" placeholder="bitcoin, ethereum, solana...">

        <!-- Loading Spinner -->

        <div id="spinner" class="spinner-container">

            <div class="loader"></div>

        </div>

        <!-- Search Result -->

        <div id="results"></div>

        <!-- Favorites -->

        <section class="favorites">

            <h2>⭐ My Favorites</h2>

            <ul id="favList"></ul>

        </section>

        <!-- Chart Section -->

        <section class="chart-section">

            <h2>📈 7 Day Price History</h2>

            <canvas id="priceChart"></canvas>

        </section>
        <section class="market-widgets">

            <div class="widget">

                <h2>🚀 Top Gainers</h2>

                <ul id="gainersList"></ul>

            </div>

            <div class="widget">

                <h2>📉 Top Losers</h2>

                <ul id="losersList"></ul>

            </div>

        </section>

    </main>

    <div id="footer"></div>

    <script src="../js/loader.js"></script>

    <script type="module" src="../js/dashboard.js">
    </script>

</body>

</html>
