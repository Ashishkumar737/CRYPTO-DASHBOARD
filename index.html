<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CryptoDash - Real Time Crypto Tracker</title>

    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/dashboard.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

    <!-- Header -->

    <div id="header"></div>

    <main class="dashboard">

        <!-- Hero -->

        <section class="hero">

            <h1>🚀 Crypto Dashboard</h1>

            <p>
                Track cryptocurrency prices,
                charts, gainers, losers and
                market trends in real time.
            </p>

        </section>

        <!-- Search -->

        <section class="search-section">

            <input type="text" id="search" placeholder="Search Bitcoin, Ethereum, Solana...">

        </section>

        <!-- Loading -->

        <div id="spinner" class="spinner-container">

            <div class="loader"></div>

        </div>

        <!-- Search Result -->

        <section class="result-section">

            <div id="results"></div>

        </section>

        <!-- Favorites -->

        <section class="favorites">

            <h2>⭐ My Favorites</h2>

            <ul id="favList"></ul>

        </section>

        <!-- Chart -->

        <section class="chart-section">

            <h2>📈 7 Day Price History</h2>

            <canvas id="priceChart"></canvas>

        </section>

        <!-- Top Gainers & Losers -->

        <section class="market-widgets">

            <div class="widget">

                <h2>🚀 Top Gainers</h2>

                <ul id="gainersList"></ul>

            </div>

            <div class="widget">

                <h2>📉 Top Losers</h2>

                <ul id="losersList"></ul>

            </div>

        </section>

        <!-- USD INR Converter -->

        <section class="converter-section">

            <h2>💱 USD to INR Converter</h2>

            <div class="converter-box">

                <input type="number" id="usdInput" placeholder="Enter USD Amount">

                <button id="convertBtn">

                    Convert

                </button>

            </div>

            <h3 id="inrResult">

                ₹ 0.00

            </h3>

        </section>

    </main>

    <!-- Footer -->

    <div id="footer"></div>

    <!-- JS -->

    <script src="./js/loader.js"></script>

    <script type="module" src="./js/dashboard.js">
    </script>

</body>

</html>
